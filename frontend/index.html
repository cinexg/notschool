<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notschool</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['"Plus Jakarta Sans"', 'sans-serif'] },
                    colors: {
                        brand: {
                            bgDark: '#030303',
                            bgLight: '#F8FAFC',
                            yellow: '#FACC15',
                            orange: '#F97316',
                            red: '#EF4444'
                        }
                    },
                    animation: {
                        'fade-in-up': 'fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                        'blob': 'blob 15s infinite',
                    },
                    keyframes: {
                        fadeInUp: {
                            '0%': { opacity: '0', transform: 'translateY(20px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        },
                        blob: {
                            '0%': { transform: 'translate(0px, 0px) scale(1)' },
                            '33%': { transform: 'translate(30px, -50px) scale(1.1)' },
                            '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
                            '100%': { transform: 'translate(0px, 0px) scale(1)' },
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body { transition: background-color 0.5s ease; }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .dark ::-webkit-scrollbar-thumb { background: #334155; }
        ::-webkit-scrollbar-thumb:hover { background: #F97316; }

        /* Staggered Animations */
        .delay-100 { animation-delay: 100ms; }
        .delay-200 { animation-delay: 200ms; }
        .delay-300 { animation-delay: 300ms; }
        
        /* Input Autofill Override */
        input:-webkit-autofill {
            -webkit-box-shadow: 0 0 0 30px transparent inset !important;
            transition: background-color 5000s ease-in-out 0s;
        }
        .dark input:-webkit-autofill { -webkit-text-fill-color: white !important; }
        input:-webkit-autofill { -webkit-text-fill-color: #0f172a !important; }

        /* Subtle Dot Grid Background */
        .bg-grid-pattern {
            background-image: radial-gradient(rgba(0, 0, 0, 0.08) 1px, transparent 1px);
            background-size: 24px 24px;
        }
        .dark .bg-grid-pattern {
            background-image: radial-gradient(rgba(255, 255, 255, 0.04) 1px, transparent 1px);
        }
    </style>
</head>
<body class="bg-brand-bgLight text-slate-900 dark:bg-brand-bgDark dark:text-white min-h-screen relative overflow-x-hidden selection:bg-brand-orange selection:text-white">

    <div class="fixed top-4 right-4 md:top-8 md:right-8 z-50">
        <button id="themeToggle" class="p-2.5 md:p-3 rounded-full backdrop-blur-xl bg-white/60 dark:bg-black/60 border border-slate-200 dark:border-slate-800 shadow-lg text-slate-600 dark:text-slate-300 hover:text-brand-orange dark:hover:text-brand-yellow transition-all duration-300 hover:scale-110 group">
            <svg id="sunIcon" class="hidden w-5 h-5 group-hover:rotate-45 transition-transform duration-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
            <svg id="moonIcon" class="w-5 h-5 group-hover:-rotate-12 transition-transform duration-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
        </button>
    </div>

    <div class="fixed inset-0 z-0 overflow-hidden pointer-events-none transition-colors duration-700 bg-grid-pattern">
        <div class="absolute top-[-10%] left-[-10%] w-[80vw] h-[80vw] md:w-[40vw] md:h-[40vw] bg-brand-orange/20 dark:bg-brand-orange/10 rounded-full mix-blend-multiply dark:mix-blend-screen filter blur-[80px] md:blur-[120px] animate-blob"></div>
        <div class="absolute top-[20%] right-[-10%] w-[70vw] h-[70vw] md:w-[30vw] md:h-[30vw] bg-brand-yellow/30 dark:bg-brand-yellow/10 rounded-full mix-blend-multiply dark:mix-blend-screen filter blur-[80px] md:blur-[100px] animate-blob delay-100"></div>
        <div class="absolute bottom-[-20%] left-[20%] w-[90vw] h-[90vw] md:w-[50vw] md:h-[50vw] bg-brand-red/10 dark:bg-brand-red/5 rounded-full mix-blend-multiply dark:mix-blend-screen filter blur-[100px] md:blur-[120px] animate-blob delay-200"></div>
    </div>

    <div class="relative z-10 max-w-5xl mx-auto px-5 py-10 md:px-12 md:py-20 min-h-screen flex flex-col justify-center">
        
        <div class="mb-10 md:mb-16 animate-fade-in-up text-center md:text-left flex flex-col items-center md:items-start">
            <div class="mb-5 md:mb-6">
                <img src="/static/logo_notschool.svg" alt="Notschool Logo" class="h-20 md:h-28 dark:invert opacity-90 transition-all duration-300">
            </div>
            <p class="text-slate-700 dark:text-slate-300 text-base md:text-2xl font-semibold tracking-wide">Ditch the Classroom</p>
        </div>

        <form id="orchestratorForm" class="space-y-8 md:space-y-12 flex-grow w-full">
            
            <div class="animate-fade-in-up delay-100 group">
                <label class="block text-[10px] md:text-sm font-bold text-brand-orange mb-2 md:mb-3 tracking-[0.2em] uppercase ml-1">Target Objective</label>
                <div class="relative">
                    <input type="text" id="goal" required 
                        class="w-full bg-transparent border-b-2 border-slate-300 dark:border-slate-800 text-2xl md:text-4xl lg:text-5xl text-slate-900 dark:text-white pb-3 md:pb-4 focus:outline-none placeholder-slate-400 dark:placeholder-slate-700 font-medium transition-all duration-300 leading-tight" 
                        placeholder="e.g., Master Python Decorators">
                    <div class="absolute bottom-0 left-0 h-[3px] bg-gradient-to-r from-brand-yellow to-brand-orange w-0 group-focus-within:w-full transition-all duration-500 ease-out"></div>
                </div>
            </div>

            <div class="flex flex-col md:flex-row gap-5 md:gap-8 items-end animate-fade-in-up delay-200">
                
                <div class="w-full md:flex-1">
                    <label class="block text-[10px] md:text-sm font-bold text-slate-500 mb-2 md:mb-3 tracking-[0.2em] uppercase ml-1">Context Material <span class="lowercase font-medium opacity-70">(Optional)</span></label>
                    <div class="relative group cursor-pointer h-[60px] md:h-[64px]">
                        <div class="absolute inset-0 bg-white/50 dark:bg-white/[0.03] backdrop-blur-md rounded-2xl border-2 border-dashed border-slate-300 dark:border-slate-700 group-hover:border-brand-orange transition-colors duration-300"></div>
                        <input type="file" id="image" accept="image/*" 
                            class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-20" title="Choose a file">
                        <div class="absolute inset-0 z-10 flex items-center px-4 md:px-5 text-slate-600 dark:text-slate-400 font-medium">
                            <span class="bg-slate-200 dark:bg-slate-800 text-slate-700 dark:text-slate-300 px-3 py-1.5 md:px-4 md:py-2 rounded-xl text-xs md:text-sm mr-3 shadow-sm group-hover:bg-brand-orange group-hover:text-white transition-colors whitespace-nowrap">Choose File</span>
                            <span class="truncate text-xs md:text-sm max-w-[140px] md:max-w-[200px]" id="fileNameDisplay">Upload syllabus or Diagram</span>
                        </div>
                    </div>
                </div>

                <div class="w-full md:w-auto">
                    <button type="submit" id="submitBtn" 
                        class="w-full h-[60px] md:h-[64px] px-6 md:px-10 relative group overflow-hidden bg-slate-900 dark:bg-white/5 backdrop-blur-md text-white font-bold rounded-2xl transition-all duration-300 border border-transparent dark:border-white/10 hover:border-brand-orange hover:shadow-[0_0_30px_rgba(249,115,22,0.2)] flex justify-center items-center gap-3 text-base md:text-lg z-20 transform hover:-translate-y-1">
                        <div class="absolute inset-0 bg-gradient-to-r from-brand-yellow via-brand-orange to-brand-red opacity-0 group-hover:opacity-100 transition-opacity duration-300 z-0"></div>
                        <span class="relative z-10 whitespace-nowrap">Deploy Agents</span>
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 md:h-6 md:w-6 relative z-10 text-brand-yellow group-hover:text-white transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
                        </svg>
                    </button>
                </div>
            </div>
        </form>

        <div id="loader" class="hidden mt-12 animate-fade-in-up">
            <div class="flex items-center space-x-4 bg-white/60 dark:bg-black/40 backdrop-blur-xl w-fit px-5 py-3 rounded-full border border-slate-200 dark:border-slate-800 mx-auto md:mx-0">
                <div class="relative w-5 h-5 md:w-6 md:h-6">
                    <div class="absolute inset-0 rounded-full border-t-2 border-brand-orange animate-spin"></div>
                    <div class="absolute inset-1 rounded-full border-b-2 border-brand-yellow animate-spin" style="animation-direction: reverse;"></div>
                </div>
                <p id="loaderText" class="text-slate-700 dark:text-slate-300 font-bold tracking-widest uppercase text-[10px] md:text-xs animate-pulse">Initializing Node...</p>
            </div>
        </div>

        <div id="errorState" class="hidden mt-10 bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-500/30 text-red-600 dark:text-red-400 p-5 rounded-2xl animate-fade-in-up shadow-lg">
            <div class="flex items-start gap-4">
                <div class="bg-red-100 dark:bg-red-500/20 p-2 rounded-full flex-shrink-0">
                    <svg class="w-5 h-5 md:w-6 md:h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                </div>
                <div>
                    <h4 class="font-bold mb-1 text-base md:text-lg">Deployment Failed</h4>
                    <span id="errorMessage" class="text-xs md:text-sm font-medium opacity-90 leading-relaxed block"></span>
                </div>
            </div>
        </div>

        <div id="results" class="hidden mt-16 md:mt-24 pt-12 md:pt-16 border-t border-slate-200 dark:border-slate-800">
            
            <div class="flex flex-col items-start justify-between mb-10 md:mb-16 gap-5 animate-fade-in-up md:flex-row md:items-center">
                <h2 class="text-2xl md:text-4xl lg:text-5xl font-extrabold text-slate-900 dark:text-white tracking-tight leading-tight" id="courseTitle"></h2>
                <span id="calendarStatus" class="px-4 py-2 bg-white dark:bg-slate-900 text-xs md:text-sm font-bold rounded-full border border-slate-200 dark:border-slate-800 shadow-sm whitespace-nowrap flex items-center gap-2"></span>
            </div>
            
            <div class="grid lg:grid-cols-12 gap-10 lg:gap-16">
                
                <div class="lg:col-span-7 animate-fade-in-up delay-100">
                    <h3 class="text-[10px] md:text-xs font-bold mb-6 md:mb-8 text-slate-500 tracking-[0.2em] uppercase flex items-center gap-3 md:gap-4">
                        <span class="w-6 md:w-8 h-[2px] bg-brand-orange"></span> Curriculum Breakdown
                    </h3>
                    <div id="modulesList" class="space-y-0 relative before:absolute before:inset-y-0 before:left-[11px] md:before:left-[15px] before:w-[2px] before:bg-slate-200 dark:before:bg-slate-800 ml-1 md:ml-0">
                        </div>
                </div>

                <div class="lg:col-span-5 animate-fade-in-up delay-200">
                    <div class="sticky top-6 md:top-12 bg-white/70 dark:bg-white/[0.02] backdrop-blur-xl rounded-3xl p-6 md:p-8 border border-slate-200 dark:border-slate-800 shadow-xl dark:shadow-none">
                        <h3 class="text-[10px] md:text-xs font-bold mb-6 md:mb-8 text-slate-500 tracking-[0.2em] uppercase flex items-center gap-2 md:gap-3">
                            <svg class="w-4 h-4 md:w-5 md:h-5 text-brand-red" fill="currentColor" viewBox="0 0 24 24"><path d="M19.615 3.184c-3.604-.246-11.631-.245-15.23 0-3.897.266-4.356 2.62-4.385 8.816.029 6.185.484 8.549 4.385 8.816 3.6.245 11.626.246 15.23 0 3.897-.266 4.356-2.62 4.385-8.816-.029-6.185-.484-8.549-4.385-8.816zm-10.615 12.816v-8l8 3.993-8 4.007z"/></svg>
                            Curated Media
                        </h3>
                        <ul id="youtubeList" class="space-y-3 md:space-y-4">
                            </ul>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- Theme Toggle Logic ---
        const themeToggleBtn = document.getElementById('themeToggle');
        const sunIcon = document.getElementById('sunIcon');
        const moonIcon = document.getElementById('moonIcon');
        
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
            sunIcon.classList.remove('hidden');
            moonIcon.classList.add('hidden');
        } else {
            document.documentElement.classList.remove('dark');
        }

        themeToggleBtn.addEventListener('click', () => {
            document.documentElement.classList.toggle('dark');
            if (document.documentElement.classList.contains('dark')) {
                localStorage.theme = 'dark';
                sunIcon.classList.remove('hidden');
                moonIcon.classList.add('hidden');
            } else {
                localStorage.theme = 'light';
                sunIcon.classList.add('hidden');
                moonIcon.classList.remove('hidden');
            }
        });

        // --- Custom File Input Display ---
        document.getElementById('image').addEventListener('change', function(e) {
            const fileName = e.target.files[0] ? e.target.files[0].name : 'Upload syllabus or Diagram';
            document.getElementById('fileNameDisplay').textContent = fileName;
        });

        // --- Core API Logic ---
        document.getElementById('orchestratorForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const submitBtn = document.getElementById('submitBtn');
            const loader = document.getElementById('loader');
            const results = document.getElementById('results');
            const errorState = document.getElementById('errorState');
            
            // Button loading state
            submitBtn.disabled = true;
            const originalBtnContent = submitBtn.innerHTML;
            submitBtn.innerHTML = `
                <svg class="animate-spin -ml-1 mr-2 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                <span class="text-white whitespace-nowrap">Connecting...</span>
            `;
            submitBtn.classList.add('cursor-not-allowed', 'opacity-90');
            
            loader.classList.remove('hidden');
            results.classList.add('hidden');
            errorState.classList.add('hidden');

            const formData = new FormData();
            formData.append('goal', document.getElementById('goal').value);
            
            const fileInput = document.getElementById('image');
            if(fileInput.files && fileInput.files.length > 0) {
                formData.append('image', fileInput.files[0]);
            }

            // Dynamic Loader Text Interval
            const loaderText = document.getElementById('loaderText');
            const agentStatuses = [
                "Architect analyzing...", 
                "Librarian querying...", 
                "Scheduler calculating...",
                "Syncing final state..."
            ];
            let statusIndex = 0;
            const statusInterval = setInterval(() => {
                statusIndex = (statusIndex + 1) % agentStatuses.length;
                if(loaderText) loaderText.textContent = agentStatuses[statusIndex];
            }, 1800);

            try {
                // API Call
                const response = await fetch('/api/generate', {
                    method: 'POST',
                    body: formData
                });
                
                const jsonResponse = await response.json();
                
                if(jsonResponse.status === 'success') {
                    const data = jsonResponse.data;
                    
                    // 1. Set Title
                    document.getElementById('courseTitle').textContent = data.curriculum_json.title;
                    
                    // 2. Render Timeline Modules
                    const modulesDiv = document.getElementById('modulesList');
                    modulesDiv.innerHTML = '';
                    data.curriculum_json.modules.forEach((mod, index) => {
                        modulesDiv.innerHTML += `
                            <div class="relative pl-8 md:pl-12 py-4 md:py-6 group">
                                <div class="absolute left-0 top-6 md:top-8 w-6 h-6 md:w-8 md:h-8 rounded-full bg-white dark:bg-slate-900 border-4 border-slate-200 dark:border-slate-700 group-hover:border-brand-orange transition-colors duration-300 z-10 -ml-[2px] md:-ml-[1px]"></div>
                                
                                <div class="bg-white dark:bg-slate-900/50 p-5 md:p-6 rounded-2xl shadow-sm border border-slate-100 dark:border-slate-800 group-hover:shadow-lg group-hover:border-brand-orange/30 transition-all duration-300 transform group-hover:-translate-y-1">
                                    <div class="text-[10px] md:text-xs text-brand-orange font-bold uppercase tracking-[0.1em] mb-2">Phase 0${index + 1}</div>
                                    <div class="text-slate-700 dark:text-slate-300 text-sm md:text-base lg:text-lg leading-relaxed font-medium">${mod}</div>
                                </div>
                            </div>`;
                    });

                    // 3. Render YouTube Links
                    const ytList = document.getElementById('youtubeList');
                    ytList.innerHTML = '';
                    if (data.youtube_urls && data.youtube_urls.length > 0) {
                        data.youtube_urls.forEach((url, index) => {
                            ytList.innerHTML += `
                                <li class="group">
                                    <a href="${url}" target="_blank" class="flex items-center gap-3 md:gap-4 p-3 md:p-4 rounded-2xl bg-slate-50 dark:bg-slate-900/50 hover:bg-white dark:hover:bg-slate-800 border border-slate-100 dark:border-slate-800 hover:border-brand-orange/50 transition-all duration-300 shadow-sm hover:shadow-md">
                                        <div class="flex-shrink-0 w-10 h-10 md:w-12 md:h-12 rounded-full bg-slate-200 dark:bg-slate-950 flex items-center justify-center text-slate-500 dark:text-slate-400 font-bold group-hover:bg-brand-orange group-hover:text-white transition-colors text-xs md:text-sm">
                                            <svg class="w-4 h-4 md:w-5 md:h-5 ml-1" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                                        </div>
                                        <div class="flex-1 min-w-0">
                                            <div class="text-slate-900 dark:text-white font-bold text-xs md:text-sm truncate group-hover:text-brand-orange transition-colors">Watch Session ${index + 1}</div>
                                            <div class="text-slate-500 text-[10px] md:text-xs mt-0.5 md:mt-1 truncate">External Video Resource</div>
                                        </div>
                                    </a>
                                </li>`;
                        });
                    } else {
                        ytList.innerHTML = '<li class="text-slate-500 text-xs md:text-sm italic p-4 text-center">No precise video matches found.</li>';
                    }

                    // 4. Calendar Status
                    const calStatus = document.getElementById('calendarStatus');
                    if (data.calendar_event_id) {
                        calStatus.innerHTML = `<span class="relative flex h-2.5 w-2.5 md:h-3 md:w-3"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span><span class="relative inline-flex rounded-full h-2.5 w-2.5 md:h-3 md:w-3 bg-emerald-500"></span></span> <span class="text-emerald-700 dark:text-emerald-400">Synced to Calendar</span>`;
                    } else {
                        calStatus.innerHTML = `<span class="relative flex h-2.5 w-2.5 md:h-3 md:w-3"><span class="relative inline-flex rounded-full h-2.5 w-2.5 md:h-3 md:w-3 bg-brand-yellow"></span></span> <span class="text-amber-700 dark:text-amber-400">Manual Scheduling Required</span>`;
                    }

                    // Show results & scroll smoothly
                    results.classList.remove('hidden');
                    setTimeout(() => {
                        results.scrollIntoView({ behavior: 'smooth', block: 'start' });
                    }, 100);

                } else {
                    throw new Error(jsonResponse.detail || "API Orchestration Error");
                }
            } catch (error) {
                document.getElementById('errorMessage').textContent = error.message === "Failed to fetch" 
                    ? "Network offline or backend orchestrator unreachable." 
                    : error.message;
                errorState.classList.remove('hidden');
            } finally {
                clearInterval(statusInterval);
                loader.classList.add('hidden');
                
                // Reset button
                submitBtn.disabled = false;
                submitBtn.innerHTML = originalBtnContent;
                submitBtn.classList.remove('cursor-not-allowed', 'opacity-90');
            }
        });
    </script>
</body>
</html>
