<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notschool OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom scrollbar for a sleek OS feel */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1f2937; }
        ::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 4px; }
    </style>
</head>
<body class="bg-gray-900 text-white min-h-screen p-6 md:p-12 font-sans selection:bg-blue-500 selection:text-white">

    <div class="max-w-4xl mx-auto bg-gray-800 border border-gray-700 p-8 rounded-2xl shadow-2xl">
        
        <div class="mb-8 border-b border-gray-700 pb-6">
            <h1 class="text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400 mb-2">
                Notschool OS 🎓
            </h1>
            <p class="text-gray-400 text-lg">Elite AI Orchestrator for Skills and Studies.</p>
        </div>

        <form id="orchestratorForm" class="space-y-6">
            <div>
                <label class="block text-sm font-semibold text-gray-300 mb-2">What is your learning goal today?</label>
                <input type="text" id="goal" required 
                    class="w-full bg-gray-900 border border-gray-600 rounded-xl p-4 text-white focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all placeholder-gray-500" 
                    placeholder="e.g., Master Advanced Python Decorators">
            </div>

            <div class="bg-gray-900 p-4 border border-gray-600 rounded-xl border-dashed hover:border-blue-500 transition-colors">
                <label class="block text-sm font-semibold text-gray-300 mb-2">Upload Syllabus or Diagram (Optional Image)</label>
                <input type="file" id="image" accept="image/*" 
                    class="w-full text-sm text-gray-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-600 file:text-white hover:file:bg-blue-700 cursor-pointer transition-all">
            </div>

            <button type="submit" id="submitBtn" 
                class="w-full bg-gradient-to-r from-blue-600 to-blue-700 hover:from-blue-500 hover:to-blue-600 text-white font-bold py-4 px-6 rounded-xl transition-all shadow-lg hover:shadow-blue-500/30 transform hover:-translate-y-0.5 flex justify-center items-center gap-2">
                <span>Deploy Learning Agents</span>
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M10.293 3.293a1 1 0 011.414 0l6 6a1 1 0 010 1.414l-6 6a1 1 0 01-1.414-1.414L14.586 11H3a1 1 0 110-2h11.586l-4.293-4.293a1 1 0 010-1.414z" clip-rule="evenodd" />
                </svg>
            </button>
        </form>

        <div id="loader" class="hidden mt-10 text-center">
            <div class="inline-block animate-spin rounded-full h-8 w-8 border-t-2 border-b-2 border-blue-500 mb-3"></div>
            <p class="text-blue-400 font-medium animate-pulse">LangGraph Orchestrating Agents... Please wait.</p>
        </div>

        <div id="errorState" class="hidden mt-8 bg-red-900/50 border border-red-500 text-red-200 p-4 rounded-xl">
            <strong>Error:</strong> <span id="errorMessage"></span>
        </div>

        <div id="results" class="hidden mt-10 border-t border-gray-700 pt-8 animate-fade-in-up">
            
            <div class="flex items-center justify-between mb-6">
                <h2 class="text-3xl font-bold text-white" id="courseTitle"></h2>
                <span id="calendarStatus" class="px-3 py-1 bg-green-900/50 text-green-400 text-sm font-semibold rounded-full border border-green-700"></span>
            </div>
            
            <div class="grid md:grid-cols-2 gap-8">
                <div>
                    <h3 class="text-xl font-bold mb-4 text-emerald-400 flex items-center gap-2">
                        <span>📋</span> Step-by-Step Modules
                    </h3>
                    <div id="modulesList" class="space-y-4"></div>
                </div>

                <div>
                    <h3 class="text-xl font-bold mb-4 text-red-400 flex items-center gap-2">
                        <span>▶️</span> Curated YouTube Resources
                    </h3>
                    <ul id="youtubeList" class="space-y-3"></ul>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('orchestratorForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // UI State Management
            const submitBtn = document.getElementById('submitBtn');
            const loader = document.getElementById('loader');
            const results = document.getElementById('results');
            const errorState = document.getElementById('errorState');
            
            submitBtn.disabled = true;
            submitBtn.classList.add('opacity-50', 'cursor-not-allowed');
            loader.classList.remove('hidden');
            results.classList.add('hidden');
            errorState.classList.add('hidden');

            const formData = new FormData();
            formData.append('goal', document.getElementById('goal').value);
            
            const fileInput = document.getElementById('image');
            if(fileInput.files[0]) {
                formData.append('image', fileInput.files[0]);
            }

            try {
                // Ensure your FastAPI backend is running on port 8000
                const response = await fetch('http://localhost:8000/api/generate', {
                    method: 'POST',
                    body: formData
                });
                
                const jsonResponse = await response.json();
                
                if(jsonResponse.status === 'success') {
                    const data = jsonResponse.data;
                    
                    // 1. Set Title
                    document.getElementById('courseTitle').textContent = data.curriculum_json.title;
                    
                    // 2. Render Modules
                    const modulesDiv = document.getElementById('modulesList');
                    modulesDiv.innerHTML = '';
                    data.curriculum_json.modules.forEach((mod, index) => {
                        modulesDiv.innerHTML += `
                            <div class="bg-gray-900 border border-gray-700 p-4 rounded-xl shadow-inner">
                                <div class="text-xs text-emerald-500 font-bold uppercase tracking-wider mb-1">Module ${index + 1}</div>
                                <div class="text-gray-200">${mod}</div>
                            </div>`;
                    });

                    // 3. Render YouTube Links
                    const ytList = document.getElementById('youtubeList');
                    ytList.innerHTML = '';
                    if (data.youtube_urls && data.youtube_urls.length > 0) {
                        data.youtube_urls.forEach((url, index) => {
                            ytList.innerHTML += `
                                <li class="bg-gray-900 border border-gray-700 p-3 rounded-xl flex items-center gap-3 hover:border-red-500 transition-colors">
                                    <span class="text-red-500 font-bold">${index + 1}.</span>
                                    <a href="${url}" target="_blank" class="text-blue-400 hover:text-blue-300 hover:underline truncate w-full font-medium">
                                        Watch Tutorial ->
                                    </a>
                                </li>`;
                        });
                    } else {
                        ytList.innerHTML = '<li class="text-gray-500 italic">No exact resources found.</li>';
                    }

                    // 4. Calendar Status
                    const calStatus = document.getElementById('calendarStatus');
                    if (data.calendar_event_id) {
                        calStatus.textContent = "📅 Session Scheduled";
                        calStatus.className = "px-3 py-1 bg-green-900/50 text-green-400 text-sm font-semibold rounded-full border border-green-700";
                    } else {
                        calStatus.textContent = "⚠️ Scheduling Failed";
                        calStatus.className = "px-3 py-1 bg-orange-900/50 text-orange-400 text-sm font-semibold rounded-full border border-orange-700";
                    }

                    // Show results
                    results.classList.remove('hidden');
                } else {
                    throw new Error(jsonResponse.message || "Unknown API Error");
                }
            } catch (error) {
                document.getElementById('errorMessage').textContent = error.message === "Failed to fetch" 
                    ? "Network error. Is the FastAPI server running on port 8000?" 
                    : error.message;
                errorState.classList.remove('hidden');
            } finally {
                loader.classList.add('hidden');
                submitBtn.disabled = false;
                submitBtn.classList.remove('opacity-50', 'cursor-not-allowed');
            }
        });
    </script>
</body>
</html>
